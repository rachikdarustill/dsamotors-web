services:
  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/templates:/etc/nginx/templates:ro
      - ./infra/nginx/start.sh:/start.sh:ro
      - ./infra/certbot/www:/var/www/certbot:ro
      - ./infra/certbot/conf:/etc/letsencrypt:ro
    environment:
      DOMAIN: ${DOMAIN}
    command: /bin/sh /start.sh
    restart: unless-stopped

  certbot:
    image: certbot/certbot:latest
    volumes:
      - ./infra/certbot/www:/var/www/certbot
      - ./infra/certbot/conf:/etc/letsencrypt
    entrypoint: /bin/sh
    command:
      - -c
      - trap exit TERM; while :; do sleep 12h & wait $${!}; certbot renew; done
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    env_file:
      - .env
    expose:
      - "3000"
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    env_file:
      - .env
    command: /bin/sh -c "npx prisma db push && node dist/main.js"
    volumes:
      - ./feed.csv:/app/data/feed.csv:ro
    expose:
      - "3001"
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: dsamotors
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    restart: unless-stopped

volumes:
  postgres_data:
